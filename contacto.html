<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Barbería Alura</title>

    <!-- Fuente moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Estilos -->
    <link rel="stylesheet" href="style-contacto.css">
</head>

<body>

    <!-- HERO HEADER -->
    <header class="hero">
        <video src="img/Barbero - 48968.mp4" autoplay muted loop></video>

        <nav>
            <a href="index.html">Home</a>
            <a href="productos.html">Productos</a>
            <a href="contacto.html" class="active">Contacto</a>
        </nav>

        <div class="hero-content">
            <h1>Contáctanos</h1>
            <p>Estamos aquí para ayudarte</p>
        </div>
    </header>

    <!-- CONTENIDO -->
    <main class="container">

        <section class="card-form">
            <h2>Enviar Mensaje</h2>

            <form>
                <label>Nombre y Apellidos</label>
                <input type="text" required>

                <label>Correo Electrónico</label>
                <input type="email" required placeholder="email@dominio.com">

                <label>Teléfono</label>
                <input type="tel" required placeholder="000 000 0000">

                <label>Mensaje</label>
                <textarea rows="6" required></textarea>

                <label class="label-title">¿Cómo deseas ser contactado?</label>
                <div class="radios">
                    <label><input type="radio" name="contacto" checked> Whatsapp</label>
                    <label><input type="radio" name="contacto"> Teléfono</label>
                    <label><input type="radio" name="contacto"> Email</label>
                </div>

                <label class="label-title">Horario de contacto</label>
                <select>
                    <option>Mañana</option>
                    <option>Tarde</option>
                    <option>Noche</option>
                </select>

                <label class="checkbox">
                    <input type="checkbox" checked> Deseo recibir novedades
                </label>

                <button type="submit" class="btn-enviar">Enviar</button>
            </form>
        </section>

        <section class="card-table">
            <h2>Horarios de Atención</h2>

            <table>
                <thead>
                    <tr>
                        <th>Día</th>
                        <th>Horario</th>
                    </tr>
                </thead>

                <tbody>
                    <tr><td>Lunes</td><td>08:00 - 20:00</td></tr>
                    <tr><td>Miércoles</td><td>08:00 - 20:00</td></tr>
                    <tr><td>Viernes</td><td>08:00 - 20:00</td></tr>
                    <tr><td>Sábado</td><td>08:00 - 20:00</td></tr>
                </tbody>
            </table>
        </section>

    </main>

    <footer>
        <p>© 2026 Barbería Alura — Mauricio Sánchez Abella</p>
    </footer>

</body>

</html>
